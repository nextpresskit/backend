openapi: 3.0.3
info:
  title: nextpress-backend API
  version: "0.1.0-phase4"
servers:
  - url: /
tags:
  - name: health
  - name: auth
  - name: public
  - name: admin

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    errorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    tokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
      required: [access_token, refresh_token]

    post:
      type: object
      properties:
        id: { type: string }
        author_id: { type: string }
        title: { type: string }
        slug: { type: string }
        content: { type: string }
        status: { type: string, enum: [draft, published, archived] }
        published_at: { type: string, nullable: true }
        created_at: { type: string }
        updated_at: { type: string }
      required: [id, author_id, title, slug, status, created_at, updated_at]

    page:
      type: object
      properties:
        id: { type: string }
        author_id: { type: string }
        title: { type: string }
        slug: { type: string }
        content: { type: string }
        status: { type: string, enum: [draft, published, archived] }
        published_at: { type: string, nullable: true }
        created_at: { type: string }
        updated_at: { type: string }
      required: [id, author_id, title, slug, status, created_at, updated_at]

    menu:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
      required: [id, name, slug]

    menuItem:
      type: object
      properties:
        id: { nullable: true }
        parent_id: { nullable: true }
        label: { type: string }
        item_type: { nullable: true }
        ref_id: { nullable: true }
        url: { nullable: true }
        sort_order: { type: integer }
        children:
          type: array
          items:
            $ref: "#/components/schemas/menuItem"

    categoryOrTag:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
      required: [id, name, slug]

    media:
      type: object
      properties:
        id: { type: string }
        uploader_id: { type: string }
        original_name: { type: string }
        mime_type: { type: string }
        size_bytes: { type: integer }
        public_url: { type: string }
        created_at: { type: string }
      required: [id, uploader_id, original_name, mime_type, size_bytes, public_url, created_at]

    plugin:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        enabled: { type: boolean }
        version: { type: string }
        config: { type: object, additionalProperties: true }
        created_at: { type: string }
        updated_at: { type: string }
      required: [id, name, slug, enabled, version, config, created_at, updated_at]

paths:
  /health:
    get:
      tags: [health]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                required: [status]

  /ready:
    get:
      tags: [health]
      responses:
        "200":
          description: ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                required: [status]
        "503":
          description: not ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  details: { type: string }

  /v1/auth/register:
    post:
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
              required: [first_name, last_name, email, password]
      responses:
        "201":
          description: user registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  first_name: { type: string }
                  last_name: { type: string }
                  email: { type: string }
                required: [id, first_name, last_name, email]
        "400":
          description: invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/auth/login:
    post:
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                password: { type: string }
              required: [email, password]
      responses:
        "200":
          description: token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/tokenPair"
        "401":
          description: invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/auth/refresh:
    post:
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/tokenPair"
        "401":
          description: invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/posts:
    get:
      tags: [public]
      description: List published posts (no auth, RBAC not applicable)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category_id
          schema: { type: string }
        - in: query
          name: tag_id
          schema: { type: string }
      responses:
        "200":
          description: list response
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/post"
                required: [posts]
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/posts/{slug}:
    get:
      tags: [public]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/pages/{slug}:
    get:
      tags: [public]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/page"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/menus/{slug}:
    get:
      tags: [public]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Menu tree
          content:
            application/json:
              schema:
                type: object
                properties:
                  menu:
                    $ref: "#/components/schemas/menu"
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/menuItem"
                required: [menu, items]
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/admin/ping:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/admin/posts:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:read`
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
        - in: query
          name: status
          schema: { type: string, enum: [draft, published, archived] }
        - in: query
          name: author_id
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/post"
                required: [posts]
    post:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                slug: { type: string }
                content: { type: string }
              required: [title, slug]
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/admin/posts/{id}:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:read`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                slug: { type: string }
                content: { type: string }
                status: { type: string, enum: [draft, published, archived] }
              required: [title, slug, content, status]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
    delete:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]

  /v1/admin/posts/{id}/categories:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items: { type: string }
              required: [ids]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]

  /v1/admin/posts/{id}/tags:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items: { type: string }
              required: [ids]
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]

  /v1/admin/pages:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `pages:read`
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  pages:
                    type: array
                    items:
                      $ref: "#/components/schemas/page"
                required: [pages]
    post:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `pages:write`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                slug: { type: string }
                content: { type: string }
              required: [title, slug]
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/page"

  /v1/admin/pages/{id}:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `pages:read`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/page"
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `pages:write`
    delete:
      tags: [admin]
      security:
        - bearerAuth: []

  /v1/admin/categories:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `categories:read`
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      $ref: "#/components/schemas/categoryOrTag"
                required: [categories]
    post:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `categories:write`
  /v1/admin/categories/{id}:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `categories:write`
    delete:
      tags: [admin]
      security:
        - bearerAuth: []

  /v1/admin/tags:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `tags:read`
    post:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `tags:write`
  /v1/admin/tags/{id}:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
    delete:
      tags: [admin]
      security:
        - bearerAuth: []

  /v1/admin/media:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `media:read`
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  media:
                    type: array
                    items:
                      $ref: "#/components/schemas/media"
                required: [media]
    post:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `media:write` (multipart upload, form field `file`)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required: [file]
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/media"

  /v1/admin/media/{id}:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `media:read`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/media"

  /v1/admin/menus:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `menus:read`
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  menus:
                    type: array
                    items:
                      $ref: "#/components/schemas/menu"
                required: [menus]
    post:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `menus:write`

  /v1/admin/menus/{id}:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `menus:read`
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `menus:write`
    delete:
      tags: [admin]
      security:
        - bearerAuth: []

  /v1/admin/menus/{id}/items:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `menus:read`
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `menus:write`

  /v1/admin/bootstrap/claim-admin:
    post:
      tags: [admin]
      description: |
        One-time RBAC bootstrap endpoint. Exists only when `RBAC_BOOTSTRAP_ENABLED=true`.
        It is in the `/v1/admin/*` group, so it always requires a valid access token,
        and it assigns the seeded admin role to the current user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ok
        "409":
          description: bootstrap already completed
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/admin/roles:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
    post:
      tags: [admin]
      security:
        - bearerAuth: []
  /v1/admin/permissions:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
    post:
      tags: [admin]
      security:
        - bearerAuth: []
  /v1/admin/roles/{role_id}/permissions:
    post:
      tags: [admin]
      security:
        - bearerAuth: []
  /v1/admin/users/{user_id}/roles:
    post:
      tags: [admin]
      security:
        - bearerAuth: []

  /v1/admin/plugins:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `plugins:manage`
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  plugins:
                    type: array
                    items:
                      $ref: "#/components/schemas/plugin"
                required: [plugins]
    post:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `plugins:manage`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                slug: { type: string }
                enabled: { type: boolean }
                version: { type: string }
                config:
                  type: object
                  additionalProperties: true
              required: [name, slug]
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/plugin"

  /v1/admin/plugins/{id}:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `plugins:manage`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
                version: { type: string }
                config:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/plugin"
