openapi: 3.0.3
info:
  title: nextpress-backend API
  version: "0.1.0-phase4"
servers:
  - url: /
tags:
  - name: health
  - name: auth
  - name: public
  - name: admin

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    errorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    tokenPair:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
      required: [access_token, refresh_token]

    post:
      type: object
      properties:
        id: { type: string }
        uuid: { type: string, nullable: true }
        authorId: { type: string }
        author:
          type: object
          nullable: true
          additionalProperties: true
        title: { type: string }
        slug: { type: string }
        subtitle: { type: string }
        excerpt: { type: string }
        type: { type: string }
        format: { type: string }
        visibility: { type: string }
        locale: { type: string }
        timezone: { type: string }
        content: { type: string }
        status: { type: string, enum: [draft, published, archived] }
        workflowStage: { type: string }
        revision: { type: integer }
        reviewerUserId: { type: string, nullable: true }
        reviewer:
          type: object
          nullable: true
          additionalProperties: true
        lastEditedByUserId: { type: string, nullable: true }
        lastEditedBy:
          type: object
          nullable: true
          additionalProperties: true
        editors:
          type: array
          items:
            type: object
            additionalProperties: true
        scheduledPublishAt: { type: string, nullable: true }
        publishedAt: { type: string, nullable: true }
        firstIndexedAt: { type: string, nullable: true }
        customFields:
          type: object
          additionalProperties: true
          nullable: true
        flags:
          type: object
          additionalProperties: true
          nullable: true
        engagement:
          type: object
          additionalProperties: true
          nullable: true
        workflow:
          type: object
          additionalProperties: true
          nullable: true
        categories:
          type: array
          items:
            type: object
            additionalProperties: true
        category:
          type: object
          nullable: true
          additionalProperties: true
        tags:
          type: array
          items:
            type: object
            additionalProperties: true
        series:
          type: object
          nullable: true
          additionalProperties: true
        syndication:
          type: array
          items:
            type: object
            additionalProperties: true
        translations:
          type: array
          items:
            type: object
            additionalProperties: true
        translationGroupId: { type: string, nullable: true }
        gallery:
          type: array
          items:
            type: object
            additionalProperties: true
        featuredImage:
          type: object
          nullable: true
          additionalProperties: true
        seo:
          type: object
          nullable: true
          additionalProperties: true
        metrics:
          type: object
          nullable: true
          additionalProperties: true
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, authorId, title, slug, status, createdAt, updatedAt]

    page:
      type: object
      properties:
        id: { type: string }
        author_id: { type: string }
        title: { type: string }
        slug: { type: string }
        content: { type: string }
        status: { type: string, enum: [draft, published, archived] }
        published_at: { type: string, nullable: true }
        created_at: { type: string }
        updated_at: { type: string }
      required: [id, author_id, title, slug, status, created_at, updated_at]

    menu:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
      required: [id, name, slug]

    menuItem:
      type: object
      properties:
        id: { nullable: true }
        parent_id: { nullable: true }
        label: { type: string }
        item_type: { nullable: true }
        ref_id: { nullable: true }
        url: { nullable: true }
        sort_order: { type: integer }
        children:
          type: array
          items:
            $ref: "#/components/schemas/menuItem"

    categoryOrTag:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
      required: [id, name, slug]

    media:
      type: object
      properties:
        id: { type: string }
        uploader_id: { type: string }
        original_name: { type: string }
        mime_type: { type: string }
        size_bytes: { type: integer }
        public_url: { type: string }
        created_at: { type: string }
      required: [id, uploader_id, original_name, mime_type, size_bytes, public_url, created_at]

    plugin:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        enabled: { type: boolean }
        version: { type: string }
        config: { type: object, additionalProperties: true }
        created_at: { type: string }
        updated_at: { type: string }
      required: [id, name, slug, enabled, version, config, created_at, updated_at]

paths:
  /health:
    get:
      tags: [health]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                required: [status]

  /ready:
    get:
      tags: [health]
      responses:
        "200":
          description: ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                required: [status]
        "503":
          description: not ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  details: { type: string }

  /v1/auth/register:
    post:
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
              required: [first_name, last_name, email, password]
      responses:
        "201":
          description: user registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  first_name: { type: string }
                  last_name: { type: string }
                  email: { type: string }
                required: [id, first_name, last_name, email]
        "400":
          description: invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/auth/login:
    post:
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                password: { type: string }
              required: [email, password]
      responses:
        "200":
          description: token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/tokenPair"
        "401":
          description: invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/auth/refresh:
    post:
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
              required: [refresh_token]
      responses:
        "200":
          description: token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/tokenPair"
        "401":
          description: invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/posts:
    get:
      tags: [public]
      description: List published posts (no auth, RBAC not applicable)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category_id
          schema: { type: string }
        - in: query
          name: tag_id
          schema: { type: string }
      responses:
        "200":
          description: list response
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/post"
                required: [posts]
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/posts/search:
    get:
      tags: [public]
      description: Elasticsearch full-text search (requires ELASTICSEARCH_ENABLED); returns 501 with search_disabled when disabled
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: same shape as GET /v1/posts list
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/post"
                required: [posts]
        "400":
          description: missing q
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "501":
          description: Elasticsearch not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/posts/{slug}:
    get:
      tags: [public]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/pages/{slug}:
    get:
      tags: [public]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/page"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/menus/{slug}:
    get:
      tags: [public]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Menu tree
          content:
            application/json:
              schema:
                type: object
                properties:
                  menu:
                    $ref: "#/components/schemas/menu"
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/menuItem"
                required: [menu, items]
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/admin/ping:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/admin/posts:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:read`
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
        - in: query
          name: status
          schema: { type: string, enum: [draft, published, archived] }
        - in: query
          name: author_id
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/post"
                required: [posts]
    post:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                slug: { type: string }
                content: { type: string }
              required: [title, slug]
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/admin/posts/search/reindex:
    post:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Rebuilds the Elasticsearch index for all published posts. Requires `posts:write` and ELASTICSEARCH_ENABLED; returns 501 when search is disabled.
      responses:
        "200":
          description: reindexed count
          content:
            application/json:
              schema:
                type: object
                properties:
                  reindexed: { type: integer }
                required: [reindexed]
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "501":
          description: Elasticsearch not enabled for this process
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/admin/posts/{id}:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:read`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                slug: { type: string }
                content: { type: string }
                status: { type: string, enum: [draft, published, archived] }
              required: [title, slug, content, status]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "409":
          description: Slug already taken by another post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
    delete:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]

  /v1/admin/posts/{id}/categories:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`. Default response is `{ok: true}`. Use query `expand=post` to return the full post object (same shape as GET /v1/admin/posts/{id}).
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: expand
          required: false
          schema: { type: string, enum: [post] }
          description: If `post`, response body is the full post instead of `{ok: true}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items: { type: string }
              required: [ids]
      responses:
        "200":
          description: Either `{ok: true}` or full post when `expand=post`.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      ok: { type: boolean }
                    required: [ok]
                  - $ref: "#/components/schemas/post"

  /v1/admin/posts/{id}/tags:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`. Default `{ok: true}`; optional `expand=post` returns full post.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: expand
          required: false
          schema: { type: string, enum: [post] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items: { type: string }
              required: [ids]
      responses:
        "200":
          description: Either `{ok: true}` or full post when `expand=post`.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      ok: { type: boolean }
                    required: [ok]
                  - $ref: "#/components/schemas/post"

  /v1/admin/posts/{id}/metrics:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                metrics:
                  type: object
                  additionalProperties: true
              required: [metrics]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"

  /v1/admin/posts/{id}/primary-category:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categoryId: { type: string, nullable: true }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"

  /v1/admin/posts/{id}/metrics:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:read`. Returns metrics row if present.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  metrics: { type: object, nullable: true, additionalProperties: true }
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /v1/admin/posts/{id}/seo:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:read`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  seo: { type: object, nullable: true, additionalProperties: true }
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
    delete:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"

  /v1/admin/posts/{id}/featured-image:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"

  /v1/admin/posts/{id}/series-link:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`. Omit or null `seriesId` to unlink.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                seriesId: { type: string, nullable: true }
                partIndex: { type: integer, nullable: true }
                partLabel: { type: string, nullable: true }
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"

  /v1/admin/posts/{id}/coauthors:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:read`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  coAuthors:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userIds:
                  type: array
                  items: { type: string }
              required: [userIds]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"

  /v1/admin/posts/{id}/gallery:
    post:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mediaId: { type: string }
                sortOrder: { type: integer }
                caption: { type: string, nullable: true }
                alt: { type: string, nullable: true }
              required: [mediaId]
      responses:
        "201":
          content:
            application/json:
              schema:
                type: object
                properties:
                  itemId: { type: string }
                  post:
                    $ref: "#/components/schemas/post"

  /v1/admin/posts/{id}/gallery/{itemId}:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: itemId
          required: true
