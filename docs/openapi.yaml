openapi: 3.0.3
info:
  title: NextPressKit API
  version: "0.1.0-phase4"
  description: |
    Authentication supports two modes (configure with `JWT_AUTH_SOURCE` on the server):

    - **cookie** (default): access and refresh tokens are HttpOnly cookies (`JWT_ACCESS_COOKIE_NAME`, `JWT_REFRESH_COOKIE_NAME`, default `access_token` / `refresh_token`). Login and refresh responses return `user` only; browsers send cookies automatically when `CORS_ORIGINS` is set and the client uses credentials.
    - **header**: tokens are returned in JSON on login/refresh; send `Authorization: Bearer <access_jwt>` on protected routes.

    Protected routes accept **either** Bearer JWT **or** the access-token cookie (when the server is in cookie mode and the client sends cookies).
servers:
  - url: /
tags:
  - name: health
  - name: auth
  - name: public
  - name: admin

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: access_token
      description: Access JWT in HttpOnly cookie (default cookie name; override with `JWT_ACCESS_COOKIE_NAME`).
  schemas:
    errorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    tokenPair:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
      required: [accessToken, refreshToken]

    authUserPublic:
      type: object
      properties:
        id: { type: integer, format: int64 }
        uuid: { type: string }
        firstName: { type: string }
        lastName: { type: string }
        email: { type: string, format: email }
        active: { type: boolean }
        rbac:
          type: object
          properties:
            roles:
              type: array
              items: { type: string }
            permissions:
              type: array
              items: { type: string }
          required: [roles, permissions]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }
      required: [id, uuid, firstName, lastName, email, active, rbac]

    authTokensWithUser:
      type: object
      description: |
        When `JWT_AUTH_SOURCE=cookie` (default), login/refresh responses omit `tokens` and set cookies instead.
        When `JWT_AUTH_SOURCE=header`, `tokens` is present with access and refresh JWT strings.
      properties:
        tokens:
          type: object
          nullable: true
          properties:
            accessToken: { type: string }
            refreshToken: { type: string }
        user:
          $ref: "#/components/schemas/authUserPublic"
      required: [user]

    post:
      type: object
      properties:
        id: { type: string }
        uuid: { type: string, nullable: true }
        authorId: { type: string }
        author:
          type: object
          nullable: true
          additionalProperties: true
        title: { type: string }
        slug: { type: string }
        subtitle: { type: string }
        excerpt: { type: string }
        type: { type: string }
        format: { type: string }
        visibility: { type: string }
        locale: { type: string }
        timezone: { type: string }
        content: { type: string }
        status: { type: string, enum: [draft, published, archived] }
        workflowStage: { type: string }
        revision: { type: integer }
        reviewerUserId: { type: string, nullable: true }
        reviewer:
          type: object
          nullable: true
          additionalProperties: true
        lastEditedByUserId: { type: string, nullable: true }
        lastEditedBy:
          type: object
          nullable: true
          additionalProperties: true
        editors:
          type: array
          items:
            type: object
            additionalProperties: true
        scheduledPublishAt: { type: string, nullable: true }
        publishedAt: { type: string, nullable: true }
        firstIndexedAt: { type: string, nullable: true }
        customFields:
          type: object
          additionalProperties: true
          nullable: true
        flags:
          type: object
          additionalProperties: true
          nullable: true
        engagement:
          type: object
          additionalProperties: true
          nullable: true
        workflow:
          type: object
          additionalProperties: true
          nullable: true
        categories:
          type: array
          items:
            type: object
            additionalProperties: true
        category:
          type: object
          nullable: true
          additionalProperties: true
        tags:
          type: array
          items:
            type: object
            additionalProperties: true
        series:
          type: object
          nullable: true
          additionalProperties: true
        syndication:
          type: array
          items:
            type: object
            additionalProperties: true
        translations:
          type: array
          items:
            type: object
            additionalProperties: true
        translationGroupId: { type: string, nullable: true }
        gallery:
          type: array
          items:
            type: object
            additionalProperties: true
        featuredImage:
          type: object
          nullable: true
          additionalProperties: true
        seo:
          type: object
          nullable: true
          additionalProperties: true
        metrics:
          type: object
          nullable: true
          additionalProperties: true
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, authorId, title, slug, status, createdAt, updatedAt]

    page:
      type: object
      properties:
        id: { type: string }
        authorId: { type: string }
        title: { type: string }
        slug: { type: string }
        content: { type: string }
        status: { type: string, enum: [draft, published, archived] }
        publishedAt: { type: string, nullable: true }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, authorId, title, slug, status, createdAt, updatedAt]

    categoryOrTag:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
      required: [id, name, slug]

    media:
      type: object
      properties:
        id: { type: string }
        uploaderId: { type: string }
        originalName: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        publicUrl: { type: string }
        createdAt: { type: string }
      required: [id, uploaderId, originalName, mimeType, sizeBytes, publicUrl, createdAt]

    plugin:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        enabled: { type: boolean }
        version: { type: string }
        config: { type: object, additionalProperties: true }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, name, slug, enabled, version, config, createdAt, updatedAt]

paths:
  /health:
    get:
      tags: [health]
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                required: [status]

  /ready:
    get:
      tags: [health]
      responses:
        "200":
          description: ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                required: [status]
        "503":
          description: not ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  details: { type: string }

  /auth/register:
    post:
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name: { type: string }
                last_name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
              required: [first_name, last_name, email, password]
      responses:
        "201":
          description: user registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
                  uuid: { type: string }
                  firstName: { type: string }
                  lastName: { type: string }
                  email: { type: string }
                required: [id, uuid, firstName, lastName, email]
        "400":
          description: invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /auth/login:
    post:
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, format: email }
                password: { type: string }
              required: [email, password]
      responses:
        "200":
          description: |
            Current user profile. In cookie mode, also sets HttpOnly `access_token` and `refresh_token` cookies.
            In header mode, includes `tokens.accessToken` and `tokens.refreshToken` in the JSON body.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Present when `JWT_AUTH_SOURCE=cookie` (may appear twice for access and refresh cookies).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/authTokensWithUser"
        "401":
          description: invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /auth/me:
    get:
      tags: [auth]
      security:
        - bearerAuth: []
        - cookieAuth: []
      summary: Current user from access token
      responses:
        "200":
          description: authenticated user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/authUserPublic"
                required: [user]
        "401":
          description: missing or invalid access token (Bearer or access cookie, depending on server config)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "404":
          description: user id in token no longer exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /auth/refresh:
    post:
      tags: [auth]
      requestBody:
        required: false
        description: Required when `JWT_AUTH_SOURCE=header`. Omit body in cookie mode (refresh token is read from the `refresh_token` cookie).
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: |
            Current user profile. In cookie mode, rotates HttpOnly cookies. In header mode, includes new `tokens` in JSON.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Present when `JWT_AUTH_SOURCE=cookie`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/authTokensWithUser"
        "401":
          description: invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /auth/logout:
    post:
      tags: [auth]
      requestBody:
        required: false
        description: Required when `JWT_AUTH_SOURCE=header`. Omit body in cookie mode.
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        "200":
          description: Logout accepted; in cookie mode clears auth cookies.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Present when `JWT_AUTH_SOURCE=cookie` (clears cookies).
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                required: [message]
        "401":
          description: invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /posts:
    get:
      tags: [public]
      description: List published posts (no auth, RBAC not applicable)
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category_id
          schema: { type: string }
        - in: query
          name: tag_id
          schema: { type: string }
      responses:
        "200":
          description: list response
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/post"
                required: [posts]
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /posts/search:
    get:
      tags: [public]
      description: Elasticsearch full-text search (requires ELASTICSEARCH_ENABLED); returns 501 with search_disabled when disabled
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: same shape as GET /posts list
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/post"
                required: [posts]
        "400":
          description: missing q
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "501":
          description: Elasticsearch not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /posts/{slug}:
    get:
      tags: [public]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Plugins list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /pages/{slug}:
    get:
      tags: [public]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Page item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/page"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /admin/ping:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /admin/posts:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      description: Requires `posts:read`
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
        - in: query
          name: status
          schema: { type: string, enum: [draft, published, archived] }
        - in: query
          name: author_id
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: object
                properties:
                  posts:
                    type: array
                    items:
                      $ref: "#/components/schemas/post"
                required: [posts]
    post:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      description: Requires `posts:write`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                slug: { type: string }
                content: { type: string }
              required: [title, slug]
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /admin/posts/search/reindex:
    post:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      description: Rebuilds the Elasticsearch index for all published posts. Requires `posts:write` and ELASTICSEARCH_ENABLED; returns 501 when search is disabled.
      responses:
        "200":
          description: reindexed count
          content:
            application/json:
              schema:
                type: object
                properties:
                  reindexed: { type: integer }
                required: [reindexed]
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "501":
          description: Elasticsearch not enabled for this process
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /admin/posts/{id}:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      description: Requires `posts:read`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Post item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
    put:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                slug: { type: string }
                content: { type: string }
                status: { type: string, enum: [draft, published, archived] }
              required: [title, slug, content, status]
      responses:
        "200":
          description: Post updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
        "409":
          description: Slug already taken by another post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"
    delete:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Post deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                required: [ok]

  /admin/posts/{id}/categories:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      description: "Requires `posts:write`. Default response is `{ok: true}`. Use query `expand=post` to return the full post object (same shape as GET /admin/posts/{id})."
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: expand
          required: false
          schema: { type: string, enum: [post] }
          description: "If `post`, response body is the full post instead of `{ok: true}`."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items: { type: string }
              required: [ids]
      responses:
        "200":
          description: "Either `{ok: true}` or full post when `expand=post`."
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      ok: { type: boolean }
                    required: [ok]
                  - $ref: "#/components/schemas/post"

  /admin/posts/{id}/tags:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      description: "Requires `posts:write`. Default `{ok: true}`; optional `expand=post` returns full post."
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: expand
          required: false
          schema: { type: string, enum: [post] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ids:
                  type: array
                  items: { type: string }
              required: [ids]
      responses:
        "200":
          description: "Either `{ok: true}` or full post when `expand=post`."
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      ok: { type: boolean }
                    required: [ok]
                  - $ref: "#/components/schemas/post"

  /admin/posts/{id}/metrics:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                metrics:
                  type: object
                  additionalProperties: true
              required: [metrics]
      responses:
        "200":
          description: Post with updated metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
    get:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      description: Requires `posts:read`. Returns metrics row if present.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Metrics payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  metrics: { type: object, nullable: true, additionalProperties: true }
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/errorResponse"

  /admin/posts/{id}/primary-category:
    put:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                categoryId: { type: string, nullable: true }
      responses:
        "200":
          description: Post with updated primary category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"

  /admin/posts/{id}/seo:
    get:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      description: Requires `posts:read`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: SEO payload
          content:
            application/json:
              schema:
                type: object
                properties:
                  seo: { type: object, nullable: true, additionalProperties: true }
    put:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      description: Requires `posts:write`
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Post with updated SEO
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/post"
    delete:
      tags: [admin]
      security:
        - bearerAuth: []
        - cookieAuth: []
      description: Requires `posts:write`
