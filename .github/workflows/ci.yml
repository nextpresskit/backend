name: CI

on:
  push:
    branches:
      - main
      - staging
      - dev
      - 'feature/**'
  pull_request:
    branches:
      - main
      - staging
      - dev

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: nextpress_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nextpress_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run tests
        run: go test ./...

      - name: Run go vet
        run: go vet ./...

      - name: Run integration tests (Postgres)
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: "5432"
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: nextpress_test
          DB_SSLMODE: disable
        run: make test-integration

      - name: Validate OpenAPI spec
        run: go run github.com/getkin/kin-openapi/cmd/validate@latest ./docs/openapi.yaml

      - name: Run golangci-lint (optional)
        continue-on-error: true
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

